<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo King Clone - Single File</title>
    <style>
        /* --- GLOBAL STYLES --- */
        :root {
            --red: #ff3b30;
            --green: #34c759;
            --yellow: #ffcc00;
            --blue: #007aff;
            --bg-dark: #1a4a76;
            --board-bg: #ffffff;
            --border: #333;
            --gold: #ffd700;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #2a6b9f, #113154);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .screen {
            display: none;
            width: 100vw;
            height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .active-screen {
            display: flex;
        }

        /* --- UI COMPONENTS (Menus & Lobby) --- */
        .logo {
            font-size: 4rem;
            font-weight: 900;
            text-shadow: 2px 2px 0 var(--border), -2px -2px 0 var(--border), 0 4px 10px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }
        .logo span:nth-child(1) { color: var(--blue); }
        .logo span:nth-child(2) { color: var(--red); }
        .logo span:nth-child(3) { color: var(--green); }
        .logo span:nth-child(4) { color: var(--yellow); }

        .btn {
            background: linear-gradient(to bottom, #ffcc00, #e69500);
            border: 3px solid #fff;
            border-radius: 12px;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            box-shadow: 0 6px 0 #b37400, 0 10px 15px rgba(0,0,0,0.3);
            margin: 10px;
            transition: all 0.1s;
            text-transform: uppercase;
            width: 300px;
        }

        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #b37400;
        }

        .lobby-box {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .player-select {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            justify-content: center;
        }

        .radio-btn {
            background: #fff;
            color: #333;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            border: 3px solid transparent;
        }
        .radio-btn.selected {
            border-color: var(--blue);
            background: #e0f0ff;
        }

        /* --- GAME BOARD STYLES --- */
        .game-layout {
            display: flex;
            flex-direction: row;
            gap: 30px;
            align-items: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 95vw;
        }

        .board {
            width: 80vmin;
            height: 80vmin;
            max-width: 600px;
            max-height: 600px;
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            border: 2px solid var(--border);
            background: var(--board-bg);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .cell {
            border: 1px solid #ccc;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            box-sizing: border-box;
        }

        .cell.safe::after {
            content: '★';
            position: absolute;
            color: rgba(0,0,0,0.2);
            font-size: 150%;
            z-index: 0;
        }

        .cell.red { background-color: rgba(255, 59, 48, 0.3); }
        .cell.green { background-color: rgba(52, 199, 89, 0.3); }
        .cell.yellow { background-color: rgba(255, 204, 0, 0.3); }
        .cell.blue { background-color: rgba(0, 122, 255, 0.3); }

        .base-container {
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--border);
        }
        .base-container.red { background-color: var(--red); }
        .base-container.green { background-color: var(--green); }
        .base-container.yellow { background-color: var(--yellow); }
        .base-container.blue { background-color: var(--blue); }

        .inner-base {
            background: white;
            width: 65%;
            height: 65%;
            border-radius: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
            padding: 10px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        .base-slot {
            border: 2px solid #ddd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .center-home {
            background: conic-gradient(from -45deg, var(--green) 90deg, var(--yellow) 90deg 180deg, var(--blue) 180deg 270deg, var(--red) 270deg 360deg);
            border: 1px solid var(--border);
        }

        /* --- TOKENS --- */
        .token {
            width: 70%;
            aspect-ratio: 1;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 3px 6px rgba(0,0,0,0.4), inset 0 -3px 5px rgba(0,0,0,0.2);
            z-index: 10;
            transition: transform 0.2s;
            position: relative;
        }
        .token-red { background: var(--red); }
        .token-green { background: var(--green); }
        .token-yellow { background: var(--yellow); }
        .token-blue { background: var(--blue); }

        .token.highlight {
            cursor: pointer;
            animation: pulse 1s infinite;
            box-shadow: 0 0 12px 4px currentColor, inset 0 -3px 5px rgba(0,0,0,0.2);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .cell.multiple .token { width: 40%; margin: 2%; }

        /* --- GAME CONTROLS --- */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 220px;
            padding: 20px;
            background: #fafafa;
            border-radius: 12px;
            border: 1px solid #ddd;
            color: #333;
            text-align: center;
        }

        .turn-indicator {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .dice-container {
            width: 80px;
            height: 80px;
            background: #fff;
            border: 3px solid #333;
            border-radius: 15px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 8px;
            box-sizing: border-box;
            box-shadow: 0 4px 0 #333;
            cursor: pointer;
            margin-bottom: 20px;
            transition: transform 0.1s;
        }
        .dice-container:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #333;
        }
        .dice-container.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }
        .dot {
            background: #333;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            justify-self: center;
            align-self: center;
            display: none;
        }

        .status-msg { font-size: 1rem; color: #555; min-height: 40px; }

        /* --- REWARD SCREEN --- */
        .reward-popup {
            background: rgba(0, 0, 0, 0.9);
            border: 5px solid var(--gold);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 0 50px var(--gold);
            animation: popIn 0.5s ease-out;
        }

        .coins {
            font-size: 3rem;
            color: var(--gold);
            margin: 20px 0;
            font-weight: bold;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 900px) {
            .game-layout { flex-direction: column; padding: 10px; overflow-y: auto; max-height: 100vh;}
            .controls { width: 100%; flex-direction: row; justify-content: space-around; }
            .dice-container { margin-bottom: 0; width: 60px; height: 60px; }
            .dot { width: 10px; height: 10px; }
        }
    </style>
</head>
<body>

    <div id="screen-menu" class="screen active-screen">
        <div class="logo">
            <span>L</span><span>U</span><span>D</span><span>O</span> KING
        </div>
        <button class="btn" onclick="showScreen('screen-lobby')">Play With Friends</button>
        <button class="btn" onclick="showScreen('screen-lobby')">Local Multiplayer</button>
    </div>

    <div id="screen-lobby" class="screen">
        <div class="lobby-box">
            <h2>Create Room</h2>
            <p>Select Number of Players:</p>
            <div class="player-select">
                <div class="radio-btn selected" id="btn-2p" onclick="selectPlayers(2)">2 Player</div>
                <div class="radio-btn" id="btn-3p" onclick="selectPlayers(3)">3 Player</div>
                <div class="radio-btn" id="btn-4p" onclick="selectPlayers(4)">4 Player</div>
                <div class="radio-btn" id="btn-6p" onclick="alert('Classic board supports max 4 players. 6-Player hex board coming soon in an update!')">6 Player</div>
            </div>
            
            <div id="room-code-display" style="display: none; margin: 20px 0;">
                <h3 style="color: var(--gold);">Room Code: <span id="room-code"></span></h3>
                <p>Waiting for others to join...</p>
            </div>

            <button class="btn" id="create-room-btn" onclick="createRoom()">Create Room</button>
            <button class="btn" id="start-game-btn" style="display: none;" onclick="startGame()">Start Game</button>
            <br>
            <button class="btn" style="background: #555; box-shadow: 0 6px 0 #222; margin-top: 20px;" onclick="showScreen('screen-menu')">Back</button>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div class="game-layout">
            <div id="board" class="board"></div>
            <div class="controls">
                <div id="turn-indicator" class="turn-indicator">Red's Turn</div>
                <div id="dice-container" class="dice-container" onclick="rollDice()">
                    <div class="dot" id="dot-1"></div><div class="dot" id="dot-2"></div><div class="dot" id="dot-3"></div>
                    <div class="dot" id="dot-4"></div><div class="dot" id="dot-5"></div><div class="dot" id="dot-6"></div>
                    <div class="dot" id="dot-7"></div><div class="dot" id="dot-8"></div><div class="dot" id="dot-9"></div>
                </div>
                <div id="status-msg" class="status-msg">Click dice to roll</div>
            </div>
        </div>
    </div>

    <div id="screen-win" class="screen">
        <div class="reward-popup">
            <h1 id="win-title">👑 PLAYER WINS! 👑</h1>
            <p>Congratulations! You have dominated the board.</p>
            <div class="coins">💰 +10,000 Coins</div>
            <button class="btn" onclick="location.reload()">Claim & Go Home</button>
        </div>
    </div>

    <script>
        // --- UI & LOBBY LOGIC ---
        let selectedPlayerCount = 2;
        let activePlayers = []; // e.g., [0, 2] for 2 players (Red, Yellow)

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }

        function selectPlayers(num) {
            selectedPlayerCount = num;
            document.querySelectorAll('.radio-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById(`btn-${num}p`).classList.add('selected');
        }

        function createRoom() {
            // Generate Random Room Code
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            document.getElementById('room-code').innerText = code;
            document.getElementById('room-code-display').style.display = 'block';
            document.getElementById('create-room-btn').style.display = 'none';
            document.getElementById('start-game-btn').style.display = 'inline-block';
        }

        function startGame() {
            // Configure Active Players based on selection
            if(selectedPlayerCount === 2) activePlayers = [0, 2]; // Red, Yellow
            if(selectedPlayerCount === 3) activePlayers = [0, 1, 2]; // Red, Green, Yellow
            if(selectedPlayerCount === 4) activePlayers = [0, 1, 2, 3]; // All

            currentPlayerIndex = 0; // Starts with first in array
            showScreen('screen-game');
            initBoard();
            updateTurnUI();
        }

        // --- GAME CONSTANTS & PATHS ---
        const colors = ['red', 'green', 'yellow', 'blue'];
        const hexColors = ['#ff3b30', '#34c759', '#ffcc00', '#007aff'];
        const startIndices = { 0: 0, 1: 13, 2: 26, 3: 39 };
        const safeZones = [0, 8, 13, 21, 26, 34, 39, 47]; // Star positions

        // Map 52 outer path steps (Clockwise)
        const mainPath = [];
        for(let c=1; c<=5; c++) mainPath.push({r:6, c:c});     // Red Out
        mainPath.push({r:5, c:6});                             
        for(let r=4; r>=0; r--) mainPath.push({r:r, c:6});     
        mainPath.push({r:0, c:7});                             
        mainPath.push({r:0, c:8});                             
        for(let r=1; r<=5; r++) mainPath.push({r:r, c:8});     // Green Out
        mainPath.push({r:6, c:9});                             
        for(let c=10; c<=14; c++) mainPath.push({r:6, c:c});   
        mainPath.push({r:7, c:14});                            
        mainPath.push({r:8, c:14});                            
        for(let c=13; c>=9; c--) mainPath.push({r:8, c:c});    // Yellow Out
        mainPath.push({r:9, c:8});                             
        for(let r=10; r<=14; r++) mainPath.push({r:r, c:8});   
        mainPath.push({r:14, c:7});                            
        mainPath.push({r:14, c:6});                            
        for(let r=13; r>=9; r--) mainPath.push({r:r, c:6});    // Blue Out
        mainPath.push({r:8, c:5});                             
        for(let c=4; c>=0; c--) mainPath.push({r:8, c:c});     
        mainPath.push({r:7, c:0});                             
        mainPath.push({r:6, c:0});                             

        const homePaths = {
            0: [1,2,3,4,5].map(c => ({r:7, c:c})), // Red Home
            1: [1,2,3,4,5].map(r => ({r:r, c:7})), // Green Home
            2: [13,12,11,10,9].map(c => ({r:7, c:c})), // Yellow Home
            3: [13,12,11,10,9].map(r => ({r:r, c:7}))  // Blue Home
        };

        // --- GAME STATE ---
        let tokens = [];
        let currentPlayerIndex = 0; 
        let gameState = 'ROLL'; // 'ROLL', 'MOVE', 'ANIMATING'
        let currentDiceValue = 0;
        let validMoves = [];

        const delay = ms => new Promise(res => setTimeout(res, ms));

        // --- BOARD CREATION ---
        function initBoard() {
            const board = document.getElementById('board');
            board.innerHTML = ''; // Clear existing
            
            const baseConfigs = [
                { id: 'base-0', color: 'red', area: '1/1/7/7' },
                { id: 'base-1', color: 'green', area: '1/10/7/16' },
                { id: 'base-2', color: 'yellow', area: '10/10/16/16' },
                { id: 'base-3', color: 'blue', area: '10/1/16/7' }
            ];
            
            baseConfigs.forEach((b, pIdx) => {
                let el = document.createElement('div');
                el.className = `base-container ${b.color}`;
                el.style.gridArea = b.area;
                
                // Dim bases for players not in the game
                if(!activePlayers.includes(pIdx)) el.style.opacity = '0.3';

                let inner = document.createElement('div');
                inner.className = 'inner-base';
                for(let i=0; i<4; i++) {
                    let slot = document.createElement('div');
                    slot.className = 'base-slot';
                    slot.id = `base-${pIdx}-${i}`;
                    inner.appendChild(slot);
                }
                el.appendChild(inner);
                board.appendChild(el);
            });

            // Center Finished Area
            let center = document.createElement('div');
            center.className = 'center-home';
            center.id = 'center-home';
            center.style.gridArea = '7/7/10/10';
            board.appendChild(center);

            // Draw Path Cells
            const isBaseOrCenter = (r, c) => {
                if (r < 6 && c < 6) return true;
                if (r < 6 && c > 8) return true;
                if (r > 8 && c > 8) return true;
                if (r > 8 && c < 6) return true;
                if (r >= 6 && r <= 8 && c >= 6 && c <= 8) return true;
                return false;
            };

            for(let r=0; r<15; r++) {
                for(let c=0; c<15; c++) {
                    if (isBaseOrCenter(r, c)) continue;

                    let cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${r}-${c}`;
                    cell.style.gridArea = `${r+1}/${c+1}/${r+2}/${c+2}`;

                    // Stars & Home Colors
                    if (r === 6 && c === 1) cell.classList.add('safe', 'red');
                    if (r === 1 && c === 8) cell.classList.add('safe', 'green');
                    if (r === 8 && c === 13) cell.classList.add('safe', 'yellow');
                    if (r === 13 && c === 6) cell.classList.add('safe', 'blue');

                    if ((r===2 && c===6) || (r===6 && c===12) || (r===12 && c===8) || (r===8 && c===2)) cell.classList.add('safe');

                    if (r === 7 && c >= 1 && c <= 5) cell.classList.add('red');
                    if (c === 7 && r >= 1 && r <= 5) cell.classList.add('green');
                    if (r === 7 && c >= 9 && c <= 13) cell.classList.add('yellow');
                    if (c === 7 && r >= 9 && r <= 13) cell.classList.add('blue');

                    board.appendChild(cell);
                }
            }

            // Initialize Tokens for Active Players Only
            tokens = [];
            activePlayers.forEach(p => {
                for(let t=0; t<4; t++) {
                    tokens.push({
                        id: `token-${p}-${t}`,
                        player: p,
                        tIdx: t,
                        stepsTaken: 0,
                        isFinished: false
                    });
                }
            });
            renderTokens();
        }

        function renderTokens() {
            document.querySelectorAll('.token').forEach(el => el.remove());
            document.querySelectorAll('.cell').forEach(el => el.classList.remove('multiple'));

            let cellCounts = {}; 

            tokens.forEach(token => {
                let tokenEl = document.createElement('div');
                tokenEl.className = `token token-${colors[token.player]}`;
                tokenEl.id = token.id;
                tokenEl.onclick = () => handleTokenClick(token.id);
                
                if (validMoves.includes(token.id)) tokenEl.classList.add('highlight');

                let targetId = '';
                if (token.stepsTaken === 0) targetId = `base-${token.player}-${token.tIdx}`;
                else if (token.stepsTaken <= 51) {
                    let pathIdx = (startIndices[token.player] + token.stepsTaken - 1) % 52;
                    let pos = mainPath[pathIdx];
                    targetId = `cell-${pos.r}-${pos.c}`;
                } else if (token.stepsTaken <= 56) {
                    let hIdx = token.stepsTaken - 52;
                    let pos = homePaths[token.player][hIdx];
                    targetId = `cell-${pos.r}-${pos.c}`;
                } else targetId = 'center-home';

                let container = document.getElementById(targetId);
                if (container) {
                    container.appendChild(tokenEl);
                    if (targetId.startsWith('cell-')) cellCounts[targetId] = (cellCounts[targetId] || 0) + 1;
                }
            });

            for (let id in cellCounts) {
                if (cellCounts[id] > 1) document.getElementById(id).classList.add('multiple');
            }
        }

        // --- DICE RENDERING ---
        function setDiceDots(value) {
            document.querySelectorAll('.dot').forEach(d => d.style.display = 'none');
            const layouts = {
                1: [5],
                2: [1, 9],
                3: [1, 5, 9],
                4: [1, 3, 7, 9],
                5: [1, 3, 5, 7, 9],
                6: [1, 3, 4, 6, 7, 9]
            };
            if(layouts[value]) layouts[value].forEach(dot => document.getElementById(`dot-${dot}`).style.display = 'block');
        }

        async function rollDice() {
            if (gameState !== 'ROLL') return;
            gameState = 'ANIMATING';
            
            const diceCont = document.getElementById('dice-container');
            const statusMsg = document.getElementById('status-msg');
            diceCont.classList.add('disabled');
            statusMsg.innerText = "Rolling...";

            // Animation
            for(let i=0; i<6; i++) {
                setDiceDots(Math.floor(Math.random() * 6) + 1);
                await delay(80);
            }

            currentDiceValue = Math.floor(Math.random() * 6) + 1;
            setDiceDots(currentDiceValue);
            checkAvailableMoves();
        }

        // --- MOVEMENT LOGIC ---
        function checkAvailableMoves() {
            validMoves = [];
            let activePlayerColor = activePlayers[currentPlayerIndex];

            tokens.forEach(t => {
                if (t.player !== activePlayerColor || t.isFinished) return;
                if (t.stepsTaken === 0 && currentDiceValue === 6) validMoves.push(t.id);
                else if (t.stepsTaken > 0 && t.stepsTaken + currentDiceValue <= 57) validMoves.push(t.id);
            });

            if (validMoves.length === 0) {
                document.getElementById('status-msg').innerText = "No valid moves. Next Turn.";
                setTimeout(() => advanceTurn(false), 1500);
            } else {
                gameState = 'MOVE';
                document.getElementById('status-msg').innerText = "Select a highlighted token.";
                renderTokens();
            }
        }

        async function handleTokenClick(tokenId) {
            if (gameState !== 'MOVE' || !validMoves.includes(tokenId)) return;
            gameState = 'ANIMATING';
            validMoves = [];
            renderTokens();

            let token = tokens.find(t => t.id === tokenId);
            
            if (token.stepsTaken === 0) {
                token.stepsTaken = 1;
                renderTokens();
                await delay(300);
            } else {
                for(let i=0; i<currentDiceValue; i++) {
                    token.stepsTaken++;
                    renderTokens();
                    await delay(150);
                }
            }
            evaluatePostMove(token);
        }

        async function evaluatePostMove(movedToken) {
            let extraTurn = false;

            // Finished Token
            if (movedToken.stepsTaken === 57) {
                movedToken.isFinished = true;
                extraTurn = true;
                document.getElementById('status-msg').innerText = "Token reached home!";
                await delay(1000);
                
                // WIN CONDITION
                if (tokens.filter(t => t.player === movedToken.player && t.isFinished).length === 4) {
                    showWinScreen(movedToken.player);
                    return;
                }
            } 
            // Capture Logic
            else if (movedToken.stepsTaken <= 51) {
                let pathIdx = (startIndices[movedToken.player] + movedToken.stepsTaken - 1) % 52;
                if (!safeZones.includes(pathIdx)) {
                    let captureHappened = false;
                    tokens.forEach(t => {
                        if (t.player !== movedToken.player && t.stepsTaken > 0 && t.stepsTaken <= 51) {
                            let tPathIdx = (startIndices[t.player] + t.stepsTaken - 1) % 52;
                            if (tPathIdx === pathIdx) {
                                t.stepsTaken = 0; // Capture!
                                captureHappened = true;
                            }
                        }
                    });
                    if (captureHappened) {
                        extraTurn = true;
                        document.getElementById('status-msg').innerText = "Capture! Extra turn.";
                        renderTokens();
                        await delay(1000);
                    }
                }
            }

            if (currentDiceValue === 6) {
                extraTurn = true;
                if(document.getElementById('status-msg').innerText === "Select a highlighted token.") {
                    document.getElementById('status-msg').innerText = "Rolled a 6! Extra turn.";
                }
            }

            advanceTurn(extraTurn);
        }

        function advanceTurn(keepTurn) {
            if (!keepTurn) {
                currentPlayerIndex = (currentPlayerIndex + 1) % activePlayers.length;
            }
            updateTurnUI();
            
            gameState = 'ROLL';
            currentDiceValue = 0;
            validMoves = [];
            document.getElementById('dice-container').classList.remove('disabled');
            document.getElementById('status-msg').innerText = keepTurn ? "Roll Again!" : "Click to Roll";
            setDiceDots(1); // Reset visuals
            renderTokens();
        }

        function updateTurnUI() {
            const pColor = activePlayers[currentPlayerIndex];
            const indicator = document.getElementById('turn-indicator');
            indicator.innerText = `${colors[pColor]}'s Turn`;
            indicator.style.color = hexColors[pColor];
        }

        function showWinScreen(playerCode) {
            document.getElementById('win-title').innerText = `👑 ${colors[playerCode].toUpperCase()} WINS! 👑`;
            showScreen('screen-win');
        }

        // Init default dice look
        setDiceDots(1);
    </script>
</body>
</html>
